<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw/dist/excalidraw.production.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;

        const ExcalidrawLib = window.ExcalidrawLib || window.Excalidraw;
        const exportToSvg = ExcalidrawLib && ExcalidrawLib.exportToSvg;
        if (!exportToSvg) {
          window.__renderComplete = true;
          window.__renderError = "ExcalidrawLib.exportToSvg not found";
          return { success: false, error: "ExcalidrawLib.exportToSvg not found" };
        }

        const svg = await exportToSvg({
          elements: elements,
          appState: { ...appState, exportBackground: true },
          files: files,
        });

        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };

    // Signal ready after all scripts load (this runs synchronously after the UMD scripts above)
    window.__moduleReady = true;
  </script>
</body>
</html>
