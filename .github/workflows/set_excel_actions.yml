name: Set Excel Actions (Test Helper)

on:
  workflow_dispatch:
    inputs:
      actions:
        description: 'Comma-separated order:action pairs (e.g. 1000283728:Approve,1000282430:Reject)'
        required: true

jobs:
  set-actions:
    runs-on: ubuntu-latest
    env:
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_APP_ID:        ${{ secrets.AZURE_APP_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ONEDRIVE_SHARE_URL:  ${{ secrets.ONEDRIVE_SHARE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          cd code/sprint_11_invoice_pipeline
          python set_excel_actions.py --actions "${{ github.event.inputs.actions }}"
