name: Order State Listener

on:
  workflow_dispatch:
  schedule:
    # Restart every 6 hours — listener exits after ~5h50m (MAX_RUNTIME_S=21000)
    - cron: "0 */6 * * *"

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5h55m — safely under GitHub Actions 6h hard limit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start order state listener
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          FTF_API_KEY:       ${{ secrets.FTF_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python code/sprint_09_memory_loop/agents/agent_00_listener.py
