name: Backfill Excel Rows (One-Time)

# Writes pricing_needed + condo_rejected orders that were never posted to OneDrive Excel.
# Run once after deploying the append_approval_row() fix in A3.
# Safe to re-run — deduplicates via get_all_approval_order_ids().

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: invoice-state-write
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    env:
      FTF_API_KEY:             ${{ secrets.FTF_API_KEY }}
      FTF_API_BASE_URL:        ${{ secrets.FTF_API_BASE_URL }}
      ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
      MYSQL_HOST:              ${{ secrets.MYSQL_HOST }}
      MYSQL_PORT:              ${{ secrets.MYSQL_PORT }}
      MYSQL_USER:              ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD:          ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DB:                ${{ secrets.MYSQL_DB }}
      AZURE_TENANT_ID:         ${{ secrets.AZURE_TENANT_ID }}
      AZURE_APP_ID:            ${{ secrets.AZURE_APP_ID }}
      AZURE_CLIENT_SECRET:     ${{ secrets.AZURE_CLIENT_SECRET }}
      ONEDRIVE_SHARE_URL:      ${{ secrets.ONEDRIVE_SHARE_URL }}
      FTF_ORDER_URL:           ${{ secrets.FTF_ORDER_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill pricing_needed + condo_rejected rows to Excel
        run: |
          cd code/sprint_11_invoice_pipeline
          python backfill_excel_rows.py

      - name: Export pipeline state to JSON
        if: always()
        run: python scripts/export_pipeline_json.py

      - name: Commit updated pipeline state
        if: always()
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase --autostash origin main
          git add data/invoice_pipeline_state.xlsx data/pipeline_state.json
          git diff --cached --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git push
