name: Estimate Generation Loop

on:
  workflow_dispatch:   # Sprint 9 superseded by Sprint 11 invoice_pipeline — schedule disabled

jobs:
  run-estimate-loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run estimate generation
        env:
          FTF_API_KEY:       ${{ secrets.FTF_API_KEY }}
          FTF_API_BASE_URL:  ${{ secrets.FTF_API_BASE_URL }}   # override to production URL for Sprint 11+
          FTF_BOOKS_BASE_URL: ${{ secrets.FTF_BOOKS_BASE_URL }}
          FTF_BOOKS_USER:    ${{ secrets.FTF_BOOKS_USER }}
          FTF_BOOKS_PASSWORD: ${{ secrets.FTF_BOOKS_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python code/sprint_09_memory_loop/agents/agent_01_orchestrator.py
