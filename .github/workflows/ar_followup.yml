name: AR Follow-Up Loop

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily — Sprint 14+ activates the full AR loop
  workflow_dispatch:

jobs:
  run-ar-loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AR follow-up
        env:
          FTF_API_KEY:        ${{ secrets.FTF_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TEAMS_WEBHOOK_URL:  ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          echo "Stub — AR agents built in Sprint 7"
          echo "Activate by replacing this step with: python code/sprint_07_ar_followup/agents/agent_10_ar_scanner.py"
