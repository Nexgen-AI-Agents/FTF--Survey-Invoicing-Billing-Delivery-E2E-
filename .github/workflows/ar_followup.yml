name: AR Follow-Up Loop

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

jobs:
  run-ar-loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AR Scanner (Agent 10)
        env:
          FTF_API_KEY:          ${{ secrets.FTF_API_KEY }}
          FTF_BOOKS_BASE_URL:   ${{ secrets.FTF_BOOKS_BASE_URL }}
          FTF_BOOKS_USER:       ${{ secrets.FTF_BOOKS_USER }}
          FTF_BOOKS_PASSWORD:   ${{ secrets.FTF_BOOKS_PASSWORD }}
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_PORT:              ${{ secrets.DB_PORT }}
          DB_NAME:              ${{ secrets.DB_NAME }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          TEAMS_WEBHOOK_URL:    ${{ secrets.TEAMS_WEBHOOK_URL }}
          DEPLOY_ENV:           ${{ secrets.DEPLOY_ENV }}
        run: python code/sprint_07_ar_followup/agents/agent_10_ar_scanner.py

      - name: Run AR Escalation Alerts (Agent 11)
        env:
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_PORT:              ${{ secrets.DB_PORT }}
          DB_NAME:              ${{ secrets.DB_NAME }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          TEAMS_WEBHOOK_URL:    ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python code/sprint_07_ar_followup/agents/agent_11_ar_escalation.py
