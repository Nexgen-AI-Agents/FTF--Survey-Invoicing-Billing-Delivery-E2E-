name: Nightly Memory Loop

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC = midnight ET (11 PM ET)
  workflow_dispatch:

jobs:
  run-memory-loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run memory_manager (daily log)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python code/sprint_09_memory_loop/agents/memory/memory_manager.py

      - name: Run dream_processor (7-day reflection)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python code/sprint_09_memory_loop/agents/memory/dream_processor.py

      - name: Commit memory files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/memory/ docs/reflection.md || true
          git diff --cached --quiet || git commit -m "chore: nightly memory log $(date -u +%Y-%m-%d)"
          git push || true
