name: Morning Check-in (Nesa)

on:
  schedule:
    - cron: "30 4 5 6 *"   # 10:00 AM IST on June 5 2026 (4:30 AM UTC)
  workflow_dispatch:         # manual trigger anytime

permissions:
  contents: read

jobs:
  morning-checkin:
    runs-on: ubuntu-latest

    env:
      FTF_API_KEY:                ${{ secrets.FTF_API_KEY }}
      FTF_API_BASE_URL:           ${{ secrets.FTF_API_BASE_URL }}
      ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
      MYSQL_HOST:                 ${{ secrets.MYSQL_HOST }}
      MYSQL_PORT:                 ${{ secrets.MYSQL_PORT }}
      MYSQL_USER:                 ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD:             ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DB:                   ${{ secrets.MYSQL_DB }}
      TEAMS_TENANT_ID:            ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_APP_ID:               ${{ secrets.TEAMS_APP_ID }}
      TEAMS_CLIENT_SECRET:        ${{ secrets.TEAMS_CLIENT_SECRET }}
      TEAMS_CHAT_ID:              ${{ secrets.TEAMS_CHAT_ID }}
      TEAMS_CHAT_WEBHOOK_URL:     ${{ secrets.TEAMS_CHAT_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post morning status to Teams
        run: python scripts/morning_checkin.py
