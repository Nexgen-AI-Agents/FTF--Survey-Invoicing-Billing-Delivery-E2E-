name: Feedback Learner (A7)

# A7 is currently a no-op stub (Teams retired). This workflow is kept for
# when Excel-based learning is implemented in a future sprint.

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: feedback-learner
  cancel-in-progress: true

jobs:
  run-feedback-learner:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run A7 feedback learner
        run: |
          cd code/sprint_11_invoice_pipeline
          python -m agents.agent_a7_feedback_learner

      - name: Commit updated rules
        if: always()
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/learned_rules.json
          git diff --cached --quiet || git commit -m "chore: update learned rules [skip ci]"
          git pull --rebase origin main
          git push
