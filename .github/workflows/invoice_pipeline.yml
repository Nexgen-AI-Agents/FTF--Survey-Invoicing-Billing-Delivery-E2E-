name: Invoice Pipeline (Sprint 11)

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes — A4 polls for replies, A1 hunts for new flags
  workflow_dispatch:

jobs:
  run-invoice-pipeline:
    runs-on: ubuntu-latest

    env:
      FTF_API_KEY:                ${{ secrets.FTF_API_KEY }}
      FTF_API_BASE_URL:           ${{ secrets.FTF_API_BASE_URL }}
      ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
      DB_HOST:                    ${{ secrets.DB_HOST }}
      DB_PORT:                    ${{ secrets.DB_PORT }}
      DB_NAME:                    ${{ secrets.DB_NAME }}
      DB_USER:                    ${{ secrets.DB_USER }}
      DB_PASSWORD:                ${{ secrets.DB_PASSWORD }}
      TEAMS_TENANT_ID:            ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_APP_ID:               ${{ secrets.TEAMS_APP_ID }}
      TEAMS_CLIENT_SECRET:        ${{ secrets.TEAMS_CLIENT_SECRET }}
      TEAMS_TEAM_ID:              ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:           ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_INCOMING_WEBHOOK_URL: ${{ secrets.TEAMS_INCOMING_WEBHOOK_URL }}
      IMAP_HOST:                  ${{ secrets.IMAP_HOST }}
      IMAP_PORT:                  ${{ secrets.IMAP_PORT }}
      IMAP_USER:                  ${{ secrets.IMAP_USER }}
      IMAP_PASSWORD:              ${{ secrets.IMAP_PASSWORD }}
      SMTP_HOST:                  ${{ secrets.SMTP_HOST }}
      SMTP_PORT:                  ${{ secrets.SMTP_PORT }}
      SMTP_USER:                  ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:              ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:                  ${{ secrets.SMTP_FROM }}
      FTF_ORDER_URL:              ${{ secrets.FTF_ORDER_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB migration (idempotent — safe on every run)
        run: |
          python - <<'PYEOF'
          import os, psycopg2
          conn = psycopg2.connect(
              host=os.environ["DB_HOST"],
              port=int(os.environ.get("DB_PORT", 5432)),
              dbname=os.environ["DB_NAME"],
              user=os.environ["DB_USER"],
              password=os.environ["DB_PASSWORD"],
          )
          conn.autocommit = True
          with open("code/migrations/002_invoice_pipeline.sql") as f:
              sql = f.read()
          with conn.cursor() as cur:
              cur.execute(sql)
          conn.close()
          print("Migration 002 applied (or already up to date)")
          PYEOF

      - name: Run invoice pipeline
        run: |
          cd code/sprint_11_invoice_pipeline
          python -m agents.agent_a0_orchestrator
