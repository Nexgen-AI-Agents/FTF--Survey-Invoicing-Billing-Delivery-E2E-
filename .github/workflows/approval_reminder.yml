name: Daily Approval Reminder

on:
  workflow_dispatch:           # manual trigger only — daily cron disabled per user request

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily pending-orders reminder email
        env:
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:               ${{ secrets.SMTP_FROM }}
          NOTIFICATION_TO_EMAILS:  ${{ secrets.NOTIFICATION_TO_EMAILS }}
          FTF_ORDER_URL:           ${{ secrets.FTF_ORDER_URL }}
        run: python scripts/send_daily_reminder.py
