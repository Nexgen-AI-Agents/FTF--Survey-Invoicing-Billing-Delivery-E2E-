name: Approval Poller (Sprint 11)

on:
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Order ID to approve/reject/hold'
        required: true
        type: string
      action:
        description: 'Action: approve / reject / hold'
        required: true
        type: choice
        options: [approve, reject, hold]
      notes:
        description: 'Optional notes (e.g. reject reason)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

# Never cancel in-progress — runs are fast (~30s) and we never want to
# drop a reply check mid-flight. Queue instead.
concurrency:
  group: invoice-state-write
  cancel-in-progress: false

jobs:
  check-approvals:
    runs-on: ubuntu-latest

    env:
      FTF_API_KEY:                ${{ secrets.FTF_API_KEY }}
      FTF_API_BASE_URL:           ${{ secrets.FTF_API_BASE_URL }}
      ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
      MYSQL_HOST:                 ${{ secrets.MYSQL_HOST }}
      MYSQL_PORT:                 ${{ secrets.MYSQL_PORT }}
      MYSQL_USER:                 ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD:             ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DB:                   ${{ secrets.MYSQL_DB }}
      AZURE_TENANT_ID:            ${{ secrets.AZURE_TENANT_ID }}
      AZURE_APP_ID:               ${{ secrets.AZURE_APP_ID }}
      AZURE_CLIENT_SECRET:        ${{ secrets.AZURE_CLIENT_SECRET }}
      SMTP_HOST:                  ${{ secrets.SMTP_HOST }}
      SMTP_PORT:                  ${{ secrets.SMTP_PORT }}
      SMTP_USER:                  ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:              ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:                  ${{ secrets.SMTP_FROM }}
      FTF_ORDER_URL:              ${{ secrets.FTF_ORDER_URL }}
      GOOGLE_REVIEW_URL:          ${{ secrets.GOOGLE_REVIEW_URL }}
      NOTIFICATION_FROM_EMAIL:    ${{ secrets.NOTIFICATION_FROM_EMAIL }}
      NOTIFICATION_TO_EMAILS:     ${{ secrets.NOTIFICATION_TO_EMAILS }}
      APPROVED_SENDERS:           ${{ secrets.APPROVED_SENDERS }}
      EMAIL_OVERRIDE_ALL:         ${{ secrets.EMAIL_OVERRIDE_ALL }}
      FTF_PAY_HASH_KEY:           ${{ secrets.FTF_PAY_HASH_KEY }}
      FTF_SITE_BASE_URL:          ${{ secrets.FTF_SITE_BASE_URL }}
      SKIP_SEND_DELAY:            "1"
      # workflow_dispatch inputs — read by A4 to process the approval
      INPUT_ORDER_ID:             ${{ inputs.order_id }}
      INPUT_ACTION:               ${{ inputs.action }}
      INPUT_NOTES:                ${{ inputs.notes }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Teams replies and send approved invoices
        run: |
          cd code/sprint_11_invoice_pipeline
          python run_approval_poller.py

      - name: Export pipeline state to JSON
        if: always()
        run: python scripts/export_pipeline_json.py

      - name: Commit updated pipeline state
        if: always()
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase --autostash origin main
          git add data/invoice_pipeline_state.xlsx data/pipeline_state.json data/learned_rules.json
          git diff --cached --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git push
